name: Test and Deploy Pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: node common/scripts/install-run-rush.js install

      - name: Install Playwright browsers
        working-directory: apps/pc-client
        run: node ../../common/scripts/install-run-rushx.js install:browsers

      - name: Type check
        run: node common/scripts/install-run-rush.js lint

      - name: Validate content data
        run: node common/scripts/install-run-rush.js validate-content

      - name: Run unit tests
        run: node common/scripts/install-run-rush.js test

      - name: Run end-to-end tests
        run: node common/scripts/install-run-rush.js test:e2e --to @stellar-frontier/pc-client

      - name: Build
        run: node common/scripts/install-run-rush.js build

      - name: Configure Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/pc-client/dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: test-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
