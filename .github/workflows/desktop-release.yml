name: Build Windows Desktop Exe

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: node common/scripts/install-run-rush.js install

      - name: Validate content data
        run: node common/scripts/install-run-rush.js validate-content

      - name: Build portable Windows exe
        run: npm run package:desktop:win

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: stellar-frontier-windows-portable
          path: apps/desktop-client/release/*.exe
          if-no-files-found: error
