name: Build Windows Local HTTP Package

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-local-http-package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: node common/scripts/install-run-rush.js install

      - name: Validate content data
        run: node common/scripts/install-run-rush.js validate-content

      - name: Build local HTTP package
        run: npm run package:local-http:win

      - name: Upload local HTTP package
        uses: actions/upload-artifact@v4
        with:
          name: stellar-frontier-windows-local-http
          path: apps/pc-client/release/local-http/stellar-frontier-local-http
          if-no-files-found: error
